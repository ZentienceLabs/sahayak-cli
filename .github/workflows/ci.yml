name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify formatting
        run: |
          fmtout="$(gofmt -l .)"
          if [ -n "$fmtout" ]; then
            echo "gofmt needed on:"; echo "$fmtout"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Fuzz smoke (plan parser, short)
        run: go test ./core/llm/ -run=Fuzz -fuzz=FuzzParsePlan -fuzztime=20s

      - name: Build (lite, CGO-free)
        run: go build -trimpath -o bin/sahayak ./cmd/sahayak

  cross-compile:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go build -trimpath -o /dev/null ./cmd/sahayak
